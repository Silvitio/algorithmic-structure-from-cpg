services:
  neo4j:
    image: neo4j:5.26.14
    container_name: neo4j-apoc
    ports:
      - "7474:7474"
      - "17687:7687"
    environment:
      - NEO4J_AUTH=neo4j/strongPasswordHere
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    restart: unless-stopped
